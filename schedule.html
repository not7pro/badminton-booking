<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Court Schedule – Badminton Booking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="schedule.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <div class="logo-section">
                    <div class="logo-icon">
                        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="24" cy="24" r="22" stroke="currentColor" stroke-width="2" fill="none"/>
                            <ellipse cx="24" cy="16" rx="6" ry="10" stroke="currentColor" stroke-width="1.5" fill="none" transform="rotate(-20 24 16)"/>
                            <ellipse cx="24" cy="16" rx="6" ry="10" stroke="currentColor" stroke-width="1.5" fill="none" transform="rotate(20 24 16)"/>
                            <line x1="24" y1="26" x2="24" y2="40" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            <circle cx="24" cy="14" r="2" fill="currentColor"/>
                        </svg>
                    </div>
                    <div>
                        <h1>Court Schedule</h1>
                        <p class="tagline">Daily Slot Overview</p>
                    </div>
                </div>
                <div class="header-right">
                    <div class="date-display" id="currentDate"></div>
                </div>
            </div>
            <!-- Navigation -->
            <nav class="app-nav">
                <a href="index.html" class="nav-link">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Bookings
                </a>
                <a href="schedule.html" class="nav-link active">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                    Schedule
                </a>
            </nav>
        </header>

        <!-- Legend -->
        <div class="schedule-legend">
            <div class="legend-item">
                <span class="legend-dot free"></span> Free
            </div>
            <div class="legend-item">
                <span class="legend-dot booked-1"></span> Court 1
            </div>
            <div class="legend-item">
                <span class="legend-dot booked-2"></span> Court 2
            </div>
            <div class="legend-item">
                <span class="legend-dot booked-3"></span> Court 3
            </div>
            <div class="legend-item">
                <span class="legend-dot current-time"></span> Current Time
            </div>
        </div>

        <!-- Stats Row -->
        <div class="schedule-stats" id="scheduleStats">
            <div class="stat-card">
                <span class="stat-value" id="totalBooked">0</span>
                <span class="stat-label">Slots Booked</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="totalFree">0</span>
                <span class="stat-label">Slots Free</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="totalHours">0</span>
                <span class="stat-label">Hours Booked</span>
            </div>
        </div>

        <!-- Schedule Grid -->
        <div class="schedule-wrapper">
            <div class="schedule-table-container">
                <table class="schedule-table" id="scheduleTable">
                    <thead>
                        <tr>
                            <th class="time-col">Time</th>
                            <th class="court-col court-1-header">Court 1</th>
                            <th class="court-col court-2-header">Court 2</th>
                            <th class="court-col court-3-header">Court 3</th>
                        </tr>
                    </thead>
                    <tbody id="scheduleBody">
                        <!-- Generated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module" src="schedule.js"></script>
</body>
</html>
